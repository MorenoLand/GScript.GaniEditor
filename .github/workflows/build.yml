name: Build GraalSuite

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.1)'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            upx: true
          - os: macos-latest
            target: aarch64-apple-darwin
            upx: false
          - os: macos-12
            target: x86_64-apple-darwin
            upx: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            upx: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install UPX (Windows)
        if: matrix.upx && matrix.os == 'windows-latest'
        run: choco install upx -y

      - name: Install UPX (Linux)
        if: matrix.upx && matrix.os == 'ubuntu-22.04'
        run: sudo apt-get install -y upx

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: GraalSuite ${{ github.event.inputs.version || github.ref_name }}
          releaseBody: See changelog for details.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: UPX compress (Windows)
        if: matrix.upx && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/" -Filter "*.exe" | Where-Object { $_.Name -notlike "*setup*" } | Select-Object -First 1
          if ($exe) { upx --best --lzma $exe.FullName }

      - name: Upload portable exe (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/" -Filter "*.exe" | Where-Object { $_.Name -notlike "*setup*" } | Select-Object -First 1
          if ($exe) {
            gh release upload "${{ github.ref_name }}" $exe.FullName --clobber
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: UPX compress (Linux)
        if: matrix.upx && matrix.os == 'ubuntu-22.04'
        run: |
          bin=$(find src-tauri/target/${{ matrix.target }}/release -maxdepth 1 -type f -executable | head -1)
          if [ -n "$bin" ]; then upx --best --lzma "$bin"; fi