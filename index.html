<script>
(function() {
    const _isTauri = !!window.__TAURI__;
    const params = new URLSearchParams(location.search);
    const host = location.hostname;
    let _currentApp = null;

    let _changelogData = null;
    window.openInfoDialog = function(tab) {
        tab = tab || 'about';
        const d = document.getElementById('infoDialog');
        if (!d) return;
        d.style.display = 'flex';
        document.querySelectorAll('.info-tab-btn').forEach(b => { b.style.color = b.dataset.tab === tab ? '#4a9eff' : '#888'; b.style.background = b.dataset.tab === tab ? '#252525' : 'transparent'; });
        const c = document.getElementById('infoContent');
        if (!c) return;
        if (tab === 'about') {
            if (!c._aboutLoaded) { c._aboutLoaded = true; c._aboutHTML = '<p style="margin:0 0 12px 0;">A web-based suite of tools for Graal Online development — includes a .gani animation editor, .nw/.graal/.zelda level editor, Gmap Generator, and Setshape2 editor.</p><p style="margin:0 0 12px 0;">Part of Preagonal/OpenGraal &mdash; preserving Graal for future generations.</p><p style="margin:0 0 12px 0;border-top:1px solid #0a0a0a;padding-top:12px;font-size:11px;color:#888;"><strong>Credits:</strong><br>Original C++ TilesEditor by <a href="https://www.xing.com/profile/Stefan_Knorr9" target="_blank" style="color:#4a9eff;text-decoration:none;">Stefan Knorr</a><br>Modern C++ TilesEditor by <a href="https://github.com/lukegrahamSydney/TilesEditor" target="_blank" style="color:#4a9eff;text-decoration:none;">39ster/luke graham</a><br>GraalSuite by <a href="https://github.com/denveous" target="_blank" style="color:#4a9eff;text-decoration:none;">denveous</a></p>'; }
            c.innerHTML = c._aboutHTML;
        } else if (tab === 'changelog') {
            const _tagColors = {'GraalSuite':'#c792ea','Level Editor':'#4a9eff','Gani Editor':'#56d364','Gmap Generator':'#ffa657','Setshape2':'#ff7b72'};
            function _render() { c.innerHTML = _changelogData.map(e => `<div style="margin-bottom:20px;"><div style="font-size:13px;color:#569cd6;margin-bottom:8px;border-bottom:1px solid #3a3a3a;padding-bottom:6px;">v${e.version} <span style="color:${_tagColors[e.tag]||'#888'};font-size:11px;">(${e.tag})</span> <span style="color:#666;font-size:11px;">${e.date}</span></div><ul style="margin:0;padding-left:20px;color:#c0c0c0;">${e.changes.map(ch=>`<li style="margin-bottom:4px;">${ch}</li>`).join("")}</ul></div>`).join(""); }
            if (_changelogData) { _render(); return; }
            c.innerHTML = '<div style="color:#888;">Loading...</div>';
            fetch("changelog.json").then(r=>r.json()).then(data=>{ _changelogData=data; _render(); }).catch(()=>{ c.innerHTML='<div style="color:#888;">Failed to load changelog.</div>'; });
        }
    };
    document.addEventListener('DOMContentLoaded', () => {
        const infoClose = document.getElementById('infoClose');
        const infoDialog = document.getElementById('infoDialog');
        if (infoClose) infoClose.onclick = () => { infoDialog.style.display = 'none'; };
        if (infoDialog) { infoDialog.onclick = e => { if (e.target === infoDialog) infoDialog.style.display = 'none'; }; document.querySelectorAll('.info-tab-btn').forEach(btn => { btn.onclick = () => window.openInfoDialog(btn.dataset.tab); }); }
    });

    if (_isTauri) {
        document.body.classList.add('tauri-app');
        const _w = window.__TAURI__.window.getCurrentWindow();
        document.getElementById('tbMin').onclick = () => _w.minimize();
        document.getElementById('tbMax').onclick = () => _w.toggleMaximize();
        document.getElementById('tbClose').onclick = () => _w.close();
        document.getElementById('tbAboutBtn').onclick = () => window.openInfoDialog('about');
    }

    function detectApp() {
        if (host === 'gani.gscript.dev') return 'gani';
        if (host === 'level.gscript.dev') return 'level';
        if (params.get('app') === 'gani') return 'gani';
        if (params.get('app') === 'level') return 'level';
        return 'level';
    }

    function setURLParam(app) {
        if (host === 'gani.gscript.dev' || host === 'level.gscript.dev') return;
        const u = new URL(location.href);
        u.searchParams.set('app', app);
        history.replaceState(null, '', u.toString());
    }

    function destroyCurrent() {
        const c = document.getElementById('editorContainer');
        c.innerHTML = '';
        if (window._editor && typeof window._editor.destroy === 'function') window._editor.destroy();
        window._editor = null;
        window.levelEditor = null;
        window._aniEditorInstance = null;
    }

    function injectGani() {
        const c = document.getElementById('editorContainer');
        c.innerHTML = ganiHTML;
        _currentApp = 'gani';
        document.title = 'Gani Editor';
        if (_isTauri) { window.__TAURI__.window.getCurrentWindow().setTitle('Gani Editor'); const t = document.getElementById('tbTitle'); if (t) t.textContent = 'Gani Editor'; }
        setURLParam('gani');
        const old = document.getElementById('_aniScript');
        if (old) old.remove();
        const s = document.createElement('script');
        s.id = '_aniScript';
        s.src = 'js/anieditor.js';
        s.onload = () => {
            window.dispatchEvent(new Event('load'));
            if (!document.querySelector('script[src="js/setshape2editor.js"]')) { const ss2s = document.createElement('script'); ss2s.src = 'js/setshape2editor.js'; document.head.appendChild(ss2s); }
            if (!document.querySelector('script[src="js/gmapgenerator.js"]')) { const gmgs = document.createElement('script'); gmgs.src = 'js/gmapgenerator.js'; document.head.appendChild(gmgs); }
            if (window._pendingOpenFile && _isTauri) {
                const fp = window._pendingOpenFile; window._pendingOpenFile = null;
                setTimeout(async () => {
                    const text = await window.__TAURI__.fs.readTextFile(fp).catch(() => null);
                    if (text && typeof parseGani === 'function' && typeof addTab === 'function') { const ani = parseGani(text); if (ani) { ani.fileName = fp.replace(/\\/g,'/').split('/').pop(); addTab(ani, ani.fileName); } }
                }, 500);
            }
        };
        document.head.appendChild(s);
    }

    function injectLevel() {
        const c = document.getElementById('editorContainer');
        c.innerHTML = levelHTML;
        _currentApp = 'level';
        document.title = 'Level Editor';
        if (_isTauri) { window.__TAURI__.window.getCurrentWindow().setTitle('Level Editor'); const t = document.getElementById('tbTitle'); if (t) t.textContent = 'Level Editor'; }
        setURLParam('level');
        const tip = document.getElementById('floatingTooltip');
        if (tip) {
            const t2 = document.getElementById('floatingTooltip');
            if (t2 && t2 !== tip) t2.remove();
        }
        (function() {
            const tip2 = document.getElementById('floatingTooltip');
            if (!tip2) return;
            let target = null;
            function pos(mx, my) {
                tip2.style.left = '0'; tip2.style.top = '0';
                const tw = tip2.offsetWidth, th = tip2.offsetHeight, vw = window.innerWidth, vh = window.innerHeight;
                let x = mx - tw / 2, y = my - th - 14;
                if (y < 4) y = my + 22;
                x = Math.max(4, Math.min(x, vw - tw - 4));
                y = Math.max(4, Math.min(y, vh - th - 4));
                tip2.style.left = x + 'px'; tip2.style.top = y + 'px';
            }
            document.addEventListener('mouseover', e => {
                const btn = e.target.closest('button[title]');
                if (btn) { btn.dataset.title = btn.title; btn.removeAttribute('title'); }
                const t = e.target.closest('button[data-title]');
                if (t) { target = t; tip2.textContent = t.dataset.title; tip2.style.display = 'block'; }
            }, true);
            document.addEventListener('mousemove', e => { if (target) { const txt = target.dataset.title; if (txt && tip2.textContent !== txt) tip2.textContent = txt; pos(e.clientX, e.clientY); } });
            document.addEventListener('mouseout', e => {
                const btn = e.target.closest('button[data-title]');
                if (btn && !btn.hasAttribute('title')) { btn.setAttribute('title', btn.dataset.title); delete btn.dataset.title; }
                if (target && !target.contains(e.relatedTarget)) { target = null; tip2.style.display = 'none'; }
            }, true);
            const dropdowns = [['selectionFilterMenu','btnSelectionFilter'],['visibilityMenu','btnView'],['functionsMenu','btnFunctions']];
            document.addEventListener('click', e => {
                dropdowns.forEach(([menuId, btnId]) => {
                    const menu = document.getElementById(menuId), btn = document.getElementById(btnId);
                    if (menu && btn) {
                        if (btn.contains(e.target)) menu.classList.toggle('open');
                        else if (!menu.contains(e.target)) menu.classList.remove('open');
                    }
                });
            });
        })();
        const old = document.getElementById('_lvlScript');
        if (old) old.remove();
        const s = document.createElement('script');
        s.id = '_lvlScript';
        s.src = 'js/leveleditor.js';
        s.onload = () => requestAnimationFrame(async () => {
            window._editor = window.levelEditor = new LevelEditor();
            if (!document.querySelector('script[src="js/setshape2editor.js"]')) { const ss2s = document.createElement('script'); ss2s.src = 'js/setshape2editor.js'; document.head.appendChild(ss2s); }
            if (!document.querySelector('script[src="js/gmapgenerator.js"]')) { const gmgs = document.createElement('script'); gmgs.src = 'js/gmapgenerator.js'; document.head.appendChild(gmgs); }
            if (_isTauri) { const ra = document.getElementById('btnRegisterAssoc'); if (ra) ra.style.display = ''; }
            if (window._pendingOpenFile && _isTauri) {
                const fp = window._pendingOpenFile; window._pendingOpenFile = null;
                setTimeout(() => _tauriOpenFile(fp), 800);
            }
            if (_isTauri) {
                setTimeout(async () => {
                    try {
                        const { check } = window.__TAURI__.updater;
                        const update = await check();
                        if (update?.available) {
                            const ok = confirm(`Update ${update.version} available. Install now?`);
                            if (ok) { await update.downloadAndInstall(); window.__TAURI__.process.relaunch(); }
                        }
                    } catch(e) {}
                }, 3000);
            }
            if (_isTauri) {
                window.__TAURI__.event.listen('open-file', e => {
                    const fp = e.payload;
                    if (!fp) return;
                    if (window.levelEditor) _tauriOpenFile(fp);
                    else setTimeout(() => _tauriOpenFile(fp), 1000);
                });
                window.__TAURI__.event.listen('tauri://drag-drop', async e => {
                    const paths = e.payload?.paths || [];
                    for (const fp of paths) {
                        const name = fp.replace(/\\/g,'/').split('/').pop();
                        const ext = name.split('.').pop().toLowerCase();
                        if (ext === 'gani') {
                            if (_currentApp !== 'gani') { window._pendingOpenFile = fp; injectGani(); }
                            else {
                                const text = await window.__TAURI__.fs.readTextFile(fp).catch(() => null);
                                if (text && typeof parseGani === 'function' && typeof addTab === 'function') { const ani = parseGani(text); if (ani) { ani.fileName = name; addTab(ani, name); } }
                            }
                        } else if (/^(nw|zelda|graal|gmap)$/.test(ext)) {
                            if (_currentApp !== 'level') { window._pendingOpenFile = fp; injectLevel(); }
                            else await _tauriOpenFile(fp);
                        }
                    }
                });
            }
        });
        document.head.appendChild(s);
    }

    document.addEventListener('click', function(e) {
        if (e.target.closest('#switchBtn') || e.target.closest('#tbSwitchBtn')) {
            const next = _currentApp === 'gani' ? 'level' : 'gani';
            if (host === 'gani.gscript.dev' || host === 'level.gscript.dev')
                window.location.href = 'https://' + next + '.gscript.dev';
            else
                window.location.href = '?app=' + next;
        }
    });

    async function _tauriOpenFile(fp) {
        const name = fp.replace(/\\/g,'/').split('/').pop();
        const ext = name.split('.').pop().toLowerCase();
        if (ext === 'gani') {
            if (_currentApp !== 'gani') { window._pendingOpenFile = fp; injectGani(); return; }
            const text = await window.__TAURI__.fs.readTextFile(fp).catch(() => null);
            if (text && typeof parseGani === 'function' && typeof addTab === 'function') { const ani = parseGani(text); if (ani) { ani.fileName = name; addTab(ani, name); } }
            return;
        }
        if (_currentApp !== 'level') { window._pendingOpenFile = fp; injectLevel(); return; }
        if (ext === 'graal' || ext === 'zelda') {
            const data = await window.__TAURI__.fs.readFile(fp).catch(() => null);
            if (data && window.levelEditor) window.levelEditor.openFromBuffer(data.buffer, name, fp);
        } else {
            const text = await window.__TAURI__.fs.readTextFile(fp).catch(() => null);
            if (text && window.levelEditor) window.levelEditor.openFromText(text, name, fp);
        }
    }

    document.addEventListener('dragenter', e => e.preventDefault(), true);
    document.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }, true);
    document.addEventListener('drop', async e => {

        const editor = window.levelEditor || window._aniEditorInstance;
        if (!editor) return;
        const files = [...(e.dataTransfer.files||[])].filter(f => /\.(nw|zelda|graal|gmap|gani)$/i.test(f.name));
        for (const file of files) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'graal' || ext === 'zelda') {
                const buf = await file.arrayBuffer();
                (window.levelEditor||editor).openFromBuffer?.(buf, file.name);
            } else if (ext === 'gani') {
                const text = await file.text();
                editor.openFromText?.(text, file.name);
            } else {
                const text = await file.text();
                (window.levelEditor||editor).openFromText?.(text, file.name);
            }
        }
    }, true);

    document.addEventListener('DOMContentLoaded', function() {
        const app = detectApp();
        const init = () => { if (app === 'gani') injectGani(); else injectLevel(); };
        if (_isTauri) {
            window.__TAURI__?.core?.invoke('get_open_file_arg').then(fa => {
                if (fa) window._pendingOpenFile = fa;
                init();
            }).catch(() => init());
        } else { init(); }
    });

    const ganiHTML = `
    <div class="main-container">
        <div class="toolbar">
            <button title="New — create a blank .gani animation" id="btnNew"><i class="fas fa-file"></i></button>
            <button title="Open — open a .gani file" id="btnOpen"><i class="fas fa-folder-open"></i></button>
            <button title="Open Default GANI — load a built-in starter animation" id="btnOpenDefault"><i class="fas fa-book"></i></button>
            <button title="Save (Ctrl+S)" id="btnSave"><i class="fas fa-save"></i></button>
            <button title="Save As — save to a new file" id="btnSaveAs"><i class="fas fa-save"></i></button>
            <button title="Save All — save every open tab" id="btnSaveAll"><i class="fas fa-save-all"></i></button>
            <div style="width:1px;background:#1a1a1a;margin:0 4px;"></div>
            <button title="Set Working Directory — loads images from a local folder into the editor cache for use in .gani files. Does not upload anything to a server." id="btnWorkingDir"><i class="fas fa-folder"></i></button>
            <div style="width:1px;background:#1a1a1a;margin:0 4px;"></div>
            <div style="position:relative;">
                <button title="Color Scheme — pick a built-in theme or load custom CSS" id="btnColorScheme"><i class="fas fa-palette"></i></button>
                <div id="colorSchemeDropdown" style="display:none;position:absolute;top:100%;left:0;background:#2b2b2b;border:1px solid #0a0a0a;border-top:1px solid #404040;border-left:1px solid #404040;z-index:1000;min-width:150px;box-shadow:0 2px 8px rgba(0,0,0,0.5);margin-top:2px;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;">
                    <div class="color-scheme-item" data-scheme="default" style="background:#404040;">Default</div>
                    <div class="color-scheme-item" data-scheme="fusion-light">Fusion Light</div>
                    <div class="color-scheme-item" data-scheme="fusion-dark">Fusion Dark</div>
                    <div class="color-scheme-item" data-scheme="dark-style">Dark Style</div>
                    <div class="color-scheme-item" data-scheme="dark-orange">Dark Orange</div>
